apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vshift.fullname" . }}-config
  labels:
    {{- include "vshift.labels" . | nindent 4 }}
data:
  vshift.yaml: |
{{ .Files.Get "config/vshift.yaml" | indent 4 }}
{{- range $path, $_ := .Files.Glob "config/profiles/*.yaml" }}
  {{ trimPrefix "config/" $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
