image:
  repository: ghcr.io/bueckerlars/vshift
  tag: latest
  pullPolicy: IfNotPresent

redis:
  host: redis
  port: 6379
  password: vshift
  database: 1

ffmpeg:
  # 4 cores/node: leave headroom for demux, audio, and kube/system.
  threads: 2

server:
  replicas: 1
  serviceAccount:
    create: true
    name: vshift-server
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 384Mi
  service:
    type: ClusterIP
    port: 8000

worker:
  mode: dynamic
  dynamic:
    enabled: true
    # One 4K libx265 job per 8 GiB / 4 CPU node; raise to node count if multi-node.
    maxConcurrentPods: 1
    ttlSecondsAfterFinished: 3600
    resources:
      requests:
        cpu: 1500m
        memory: 3Gi
      limits:
        cpu: "3"
        memory: 5Gi
  static:
    enabled: false
    replicas: 0
    resources:
      requests:
        cpu: 1500m
        memory: 3Gi
      limits:
        cpu: "3"
        memory: 5Gi

kubernetes:
  namespace: default

storage:
  input:
    enabled: true
    size: 100Gi
    mountPath: /data/input
    existingClaim: ""
  output:
    enabled: true
    size: 100Gi
    mountPath: /data/output
    existingClaim: ""
  temp:
    enabled: true
    size: 50Gi
    mountPath: /data/temp
    existingClaim: ""

config:
  mountPath: /app/config
  fileName: vshift.yaml

logging:
  level: INFO
