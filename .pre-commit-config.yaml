default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Optional: enable when you want type checking on every commit.
  # Requires [tool.pyright] venvPath/venv in pyproject.toml (see pyright docs).
  # - repo: https://github.com/RobertCraigie/pyright-python
  #   rev: v1.1.409
  #   hooks:
  #     - id: pyright

  # Optional: keep uv.lock in sync when pyproject.toml changes.
  # - repo: https://github.com/astral-sh/uv-pre-commit
  #   rev: 0.8.22
  #   hooks:
  #     - id: uv-lock
