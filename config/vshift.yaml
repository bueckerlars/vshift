version: "1"

behavior:
  no_match: ignore
  input_after_success: keep
  file_stability_seconds: 10
  max_retries: 3

directories:
  input: data/input
  output: data/output
  temp: data/temp

profiles:
  4k-10Bit-H265:
    $ref: profiles/4k-10bit-h265.yaml
  4k-8Bit-SDR-H265:
    $ref: profiles/4k-8bit-sdr-h265.yaml
  1080p-10Bit:
    $ref: profiles/1080p-10bit-h265.yaml
  1080p-8Bit:
    $ref: profiles/1080p-8bit-h265.yaml

rules:
  - id: 4k_hdr_10bit
    priority: 10
    match:
      extensions: [mkv, mp4, m4v, ts]
      min_width: 3840
      min_bit_depth: 10
      hdr: true
    profile: 4k-10Bit-H265

  - id: 4k_sdr_8bit
    priority: 20
    match:
      extensions: [mkv, mp4, m4v, ts]
      min_width: 3840
      max_bit_depth: 8
    profile: 4k-8Bit-SDR-H265

  - id: 4k_10bit_sdr
    priority: 25
    match:
      extensions: [mkv, mp4, m4v, ts]
      min_width: 3840
      min_bit_depth: 10
      hdr: false
    profile: 4k-10Bit-H265

  - id: 1080p_10bit
    priority: 30
    match:
      extensions: [mkv, mp4, m4v, ts]
      max_height: 1080
      min_bit_depth: 10
    profile: 1080p-10Bit

  - id: 1080p_8bit
    priority: 40
    match:
      extensions: [mkv, mp4, m4v, ts]
      max_height: 1080
    profile: 1080p-8Bit

  - id: 4k_fallback
    priority: 50
    match:
      extensions: [mkv, mp4, m4v, ts]
      min_width: 3840
    profile: 4k-8Bit-SDR-H265
